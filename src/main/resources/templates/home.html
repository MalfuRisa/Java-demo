<!DOCTYPE html>
<html lang="zh-CN"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>个人主页</title>
</head>

<body>

<h1>登录成功</h1>

<p>
    当前登录用户：
    <strong th:text="${username}"></strong>
</p>

<p>这个页面只有登录用户才能访问。</p>

<form th:action="@{/logout}" method="post">

    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}">

    <button type="submit">退出登录</button>

</form>

</body>
</html>
